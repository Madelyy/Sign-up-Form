<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,700&family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="left-side">
            <div class="title-section">
                <h1 class="title">Letters <br>to <br>You</h1>
                <p class="subtitle">A quiet space for your words.</p>
            </div>
        </div>
        <div class="form-container">

            <form action="">
                <fieldset>
                    <legend>Register</legend>
                    <div>
                        <label for="nombre">First name<span class="required"> *</span></label>
                        <input type="text" id="nombre" name="nombre" required>

                        <label for="apellido">Last name<span class="required"> *</span></label>
                        <input type="text" name="apellido" required>

                        <label for="correo">Email<span class="required"> *</span></label>
                        <input type="email" id="correo" name="correo" required>
                    </div>
                    <div>
                        <label for="phone">Phone number<span class="required"> *</span></label>
                        <input type="tel" id="phone" name="phone" pattern="[0-9]{5}" required>

                        <label for="pass">Password<span class="required"> *</span></label>
                        <input type="password" id="pass" name="pass" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,25}"
                            title="Password must contain at least one number, one uppercase letter, one lowercase letter, and a minimun of 8 characters" required>

                        <label for="pass-confirm">Confirm password<span class="required"> *</span></label>
                        <input type="password" id="pass-confirm" name="pass-confirm"
                            pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" title ="Make sure your passwords match" required>
                    </div>

                    <section class="finish-form">
                        <button type="submit" id="create-account">Create Account</button>
                        <p>Already have an account? <a href="#">Log In</a></p>
                    </section>
                </fieldset>
            </form>


        </div>
    </div>
</body>

</html>
